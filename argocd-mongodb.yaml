# argocd-mongodb.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/klovekesh37/rocketchat-micro-argocd.git 
    targetRevision: master
    path: .
    directory:
      include: "{mongodb-secrets.yaml,mongodb-community.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: rc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
