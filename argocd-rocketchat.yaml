# argocd-rocketchat.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rocketchat
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://rocketchat.github.io/helm-charts
    chart: rocketchat
    targetRevision: "*"
    helm:
      valueFiles:
        - $values/rocketchat/values-rocketchat.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: rc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
